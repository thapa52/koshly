name: koshly
description: "A production-level personal finance dashboard built with Flutter & Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk:  '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^17.0.0

  # Local Database
  hive_flutter: ^1.1.0

  # Immutable Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Charts
  fl_chart: ^0.69.0

  # Local Notifications
  flutter_local_notifications: ^19.5.0
  
  # Date & Currency Formatting
  intl: ^0.20.2
  
  # Export
  pdf: ^3.11.3
  csv: ^6.0.0
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  
  # Preferences
  shared_preferences: ^2.5.3

  # Environment Variables
  flutter_dotenv: ^6.0.1

  # Unique ID Generation
  uuid: ^4.5.3

  # Fonts
  google_fonts: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  hive_generator: ^2.0.1
  json_serializable: ^6.9.0

  # Testing
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - .env